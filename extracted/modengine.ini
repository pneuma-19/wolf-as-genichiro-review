; Mod Engine configuration file — RELEASE build
; Mod Engine (C) 2019 Katalash. All Rights Reserved.
;
; Differences from the dev config:
;   - cacheFilePaths=1  (recommended for release: faster loading, less hitching)
;   - showDebugLog=0    (no ModEngine debug console window)
; Everything else matches the dev config.

[misc]
; Skips displaying the logos on boot
skipLogos=1

; Chain-load the gameplay DLL directly. The mod auto-loads when the game starts;
; press keys 1-6 / ` in game to use Genichiro's skills.
chainDInput8DLLPath="\sekiro_boss_control.dll"

[files]
; Loads extracted files from UXM. Mod creators only.
loadUXMFiles=0

; Load mod from override directory.
useModOverrideDirectory=1

; The directory from which to load a mod.
modOverrideDirectory="\mods"

; RELEASE: enabled — caches override file lookups, faster load + less hitching for players.
; (The dev config uses 0 so files can be edited without restarting; release players don't
;  edit files, so 1 is smoother.)
cacheFilePaths=1

[debug]
; RELEASE: off — no debug console window.
showDebugLog=0
