# ============================================================
#  Wolf as Genichiro - Genichiro's Arsenal — Key Bindings (keybinds.ini)
#  Put this file in your Sekiro game folder (next to sekiro_boss_control.dll).
#  Restart the game after editing for changes to take effect.
#
#  Format:  key = technique        ( text after # is a comment )
#  Key names:  1-9  0  A-Z  F1-F12  ` (backtick, the key below Esc)
#
#  [How invalid lines are handled]  Each line is checked on its own. A bad line
#   (no "=", unknown key name, unknown technique, or a duplicate key) is SKIPPED
#   on its own and does NOT affect the other lines — that key is simply left
#   unbound (pressing it does nothing). Every correctly written line still works.
#   If the file is missing, or every line is invalid, the default bindings below
#   are used. Deleting this file = default bindings (same as before).
# ============================================================
#  Available techniques (technique id):
#    seven_combo   Seven-slash combo
#    thunder1      Lightning slash 1
#    slash1        Slash 1
#    slash2        Slash 2
#    slash3        Slash 3
#    thunder2      Lightning slash 2
#    thunder3      Lightning slash 3
#  (You can also use a technique's raw sp_id number, e.g. 999014)
# ============================================================

1 = seven_combo
2 = thunder1
3 = slash1
4 = slash2
5 = slash3
6 = thunder2
` = thunder3
